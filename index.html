    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000;
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* АНИМИРОВАННЫЙ АБСТРАКТНЫЙ ФОН */
        .abstract-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #000000);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            mix-blend-mode: screen;
            animation: orbFloat 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #4f46e5; animation-delay: 0s; }
        .orb-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #c026d3; animation-delay: -5s; animation-direction: alternate-reverse; }
        .orb-3 { top: 40%; left: 40%; width: 45vw; height: 45vw; background: #06b6d4; animation-delay: -10s; }
        .orb-4 { top: 10%; right: 20%; width: 30vw; height: 30vw; background: #3b82f6; animation-delay: -2s; animation-duration: 15s;}

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(10vw, 15vh) scale(1.2) rotate(90deg); }
            66% { transform: translate(-10vw, 5vh) scale(0.8) rotate(180deg); }
            100% { transform: translate(5vw, -15vh) scale(1.1) rotate(270deg); }
        }

        /* Постоянная анимация для фото на главной */
        @keyframes floatImage {
            0% { transform: translateY(0) scale(1.05); }
            50% { transform: translateY(-15px) scale(1.08); }
            100% { transform: translateY(0) scale(1.05); }
        }
        .animate-float-img {
            animation: floatImage 8s ease-in-out infinite;
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* Анимация SPA */
        #app { transition: opacity 0.4s ease, transform 0.4s ease; }
        .page-enter { opacity: 0; transform: translateY(20px); filter: blur(10px); }
        .page-enter-active { opacity: 1; transform: translateY(0); filter: blur(0); }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }

        /* Бургер меню */
        #burger-menu {
            transition: all 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            clip-path: circle(0% at calc(100% - 2.5rem) 2.5rem);
        }
        #burger-menu.open {
            clip-path: circle(150% at calc(100% - 2.5rem) 2.5rem);
        }

        /* Стили модального окна проекта */
        #project-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        #project-modal.hidden-modal { opacity: 0; visibility: hidden; pointer-events: none; }
        #project-modal.active-modal { opacity: 1; visibility: visible; pointer-events: auto; }
        #modal-content {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.95) translateY(20px);
        }
        #project-modal.active-modal #modal-content { transform: scale(1) translateY(0); }
        .media-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
