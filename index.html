    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* Абстрактный анимированный фон */
        .abstract-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #050505 100%);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: moveBlobs 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #4f46e5; animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #c026d3; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: #06b6d4; animation-delay: -10s; }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5vw, 10vh) scale(1.1); }
            100% { transform: translate(-10vw, -5vh) scale(0.9); }
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Плавное появление страниц */
        #app {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .page-enter { opacity: 0; transform: translateY(20px); }
        .page-enter-active { opacity: 1; transform: translateY(0); }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }

        /* Бургер меню */
        #burger-menu {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: circle(0% at calc(100% - 2.5rem) 2.5rem);
        }
        #burger-menu.open {
            clip-path: circle(150% at calc(100% - 2.5rem) 2.5rem);
        }

        .media-container video, .media-container img {
            width: 100%; height: 100%; object-fit: cover;
        }
    </style>
</head>

    <script>
        // 1. НАВИГАЦИЯ И РОУТИНГ (SPA)
        const appContainer = document.getElementById('app');
        const burgerBtn = document.getElementById('burger-btn');
        const burgerMenu = document.getElementById('burger-menu');
        const menuLinks = document.querySelectorAll('.menu-link');

        // Управление Бургер меню
        function toggleMenu() {
            const isOpen = burgerMenu.classList.contains('open');
            if (isOpen) {
                burgerMenu.classList.remove('open');
                burgerBtn.children[0].style.transform = 'rotate(0) translateY(0)';
                burgerBtn.children[1].style.transform = 'rotate(0) translateY(0)';
            } else {
                burgerMenu.classList.add('open');
                burgerBtn.children[0].style.transform = 'rotate(45deg) translate(3px, 3px)';
                burgerBtn.children[1].style.transform = 'rotate(-45deg) translate(3px, -3px)';
            }
        }

        burgerBtn.addEventListener('click', toggleMenu);
        menuLinks.forEach(link => {
            link.addEventListener('click', toggleMenu);
        });

        // SPA Роутер
        function renderPage() {
            let hash = window.location.hash.substring(1) || 'home';
            const template = document.getElementById(`tpl-${hash}`);
            
            if (!template) {
                window.location.hash = 'home';
                return;
            }

            // Анимация ухода старой страницы
            appContainer.classList.remove('page-enter-active');
            appContainer.classList.add('page-enter');

            setTimeout(() => {
                // Вставляем новый контент
                appContainer.innerHTML = template.innerHTML;
                
                // Применяем текущий язык к новому контенту
                applyTranslations(currentLang);
                
                // Анимация появления
                requestAnimationFrame(() => {
                    appContainer.classList.remove('page-enter');
                    appContainer.classList.add('page-enter-active');
                });
            }, 300); // Время совпадает с transition в CSS
        }

        window.addEventListener('hashchange', renderPage);
        window.addEventListener('load', renderPage);

        // 2. МУЛЬТИЯЗЫЧНОСТЬ
        const translations = {
            ru: {
                nav_home: "Главная", nav_about: "О разработчике", nav_process: "Как мы работаем", nav_portfolio: "Портфолио", nav_contact: "Контакты",
                hero_hi: "Привет, я", hero_name: "Евгений",
                hero_desc: "Архитектор цифровых решений. Разрабатываю многостраничные сайты, сложные Telegram-боты и веб-приложения.",

        let currentLang = 'ru';

        function applyTranslations(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
        }

        function setLang(lang) {
            currentLang = lang;
            applyTranslations(lang);
            
            // Обновление активных кнопок (для ПК и мобилки)
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-white/20');
                if (btn.innerText.toLowerCase() === lang) {
                    btn.classList.add('active', 'bg-white/20');
                }
            });
        }
